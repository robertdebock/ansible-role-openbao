---
# tasks file for openbao

- name: Import assert.yml
  ansible.builtin.import_tasks:
    file: assert.yml
  run_once: true
  delegate_to: localhost

- name: Ensure download directory exists
  ansible.builtin.file:
    path: "{{ openbao_download_dir }}"
    state: directory
    owner: root
    group: root
    mode: "{{ openbao_download_dir_mode }}"

- name: Download OpenBao GPG key
  ansible.builtin.get_url:
    url: "{{ openbao_gpg_key_url }}"
    dest: "{{ openbao_gpg_key_path }}"
    mode: "0644"
    validate_certs: "{{ openbao_validate_certs }}"
  when:
    - not _openbao_use_deb822

- name: Import OpenBao GPG key (apt)
  when:
    - ansible_facts['pkg_mgr'] == "apt"
    - not _openbao_use_deb822
  block:
    - name: Install gnupg
      ansible.builtin.package:
        name: gnupg2

    - name: Import OpenBao GPG key (apt) - modern method
      ansible.builtin.shell: |
        gpg --dearmor -o /usr/share/keyrings/openbao-archive-keyring.gpg {{ openbao_gpg_key_path }}
      args:
        creates: /usr/share/keyrings/openbao-archive-keyring.gpg
  rescue:
    - name: Import OpenBao GPG key (apt) - legacy method
      ansible.builtin.apt_key:
        file: "{{ openbao_gpg_key_path }}"
        state: present

- name: Import OpenBao GPG key (dnf/dnf5/yum)
  ansible.builtin.rpm_key:
    key: "{{ openbao_gpg_key_path }}"
    state: present
  when:
    - ansible_facts['pkg_mgr'] in [ "dnf", "dnf5", "yum" ]

- name: Ensure CA certificates are installed (apt)
  ansible.builtin.package:
    name: ca-certificates
    state: present
  when:
    - ansible_facts['pkg_mgr'] == "apt"

- name: Configure OpenBao APT repository (deb822)
  ansible.builtin.deb822_repository:
    name: openbao
    types: deb
    uris: "{{ openbao_deb822_uris }}"
    suites: "{{ openbao_deb822_suites }}"
    components: "{{ openbao_deb822_components }}"
    signed_by: "{{ openbao_gpg_key_url }}"
    state: present
  when:
    - _openbao_use_deb822

- name: Configure OpenBao APT repository (legacy)
  ansible.builtin.apt_repository:
    repo: "{{ openbao_apt_repository }}"
    filename: "openbao"
    state: present
  when:
    - ansible_facts['pkg_mgr'] == "apt"
    - not _openbao_use_deb822

- name: Configure OpenBao YUM repository
  ansible.builtin.yum_repository:
    name: openbao
    description: OpenBao repository
    baseurl: "{{ openbao_yum_repository_baseurl }}"
    gpgcheck: "{{ openbao_yum_repository_gpgkey | length > 0 }}"
    gpgkey: "{{ openbao_yum_repository_gpgkey | default(omit) }}"
    enabled: true
  when:
    - ansible_facts['pkg_mgr'] in [ "dnf", "dnf5", "yum" ]

- name: Install OpenBao package
  ansible.builtin.package:
    name: "{{ openbao_package_name }}"
    state: present
